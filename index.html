<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3a;
    --accent: #7c6dfa;
    --accent2: #fa6d8a;
    --accent3: #6dfabc;
    --text: #e8e8f0;
    --muted: #6b6b85;
    --done: #6dfabc;
    --wip: #facc6d;
    --notstarted: #6b6b85;
    --overdue: #fa6d8a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Poppins',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

  /* HEADER */
  .header {
    padding: 24px 32px 0;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #0f0f1a 0%, var(--bg) 100%);
  }
  .logo { font-family:'Poppins',sans-serif; font-size:22px; font-weight:800; letter-spacing:-0.5px; }
  .logo span { color: var(--accent); }
  .header-meta { font-size:11px; color:var(--muted); text-align:right; line-height:1.8; }
  .live-dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--accent3); margin-right:5px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  /* DEPT TABS */
  .dept-tabs {
    display:flex; gap:0; padding: 0 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x:auto;
  }
  .dept-tabs::-webkit-scrollbar { height:3px; }
  .dept-tabs::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  .dept-tab {
    padding: 14px 22px; font-family:'Poppins',sans-serif; font-size:12px; font-weight:600;
    letter-spacing:1px; text-transform:uppercase; cursor:pointer;
    color:var(--muted); border-bottom:2px solid transparent;
    white-space:nowrap; transition:all 0.2s;
    background:none; border-top:none; border-left:none; border-right:none;
  }
  .dept-tab:hover { color:var(--text); }
  .dept-tab.active { color:var(--accent); border-bottom-color:var(--accent); }

  /* CONTROLS BAR */
  .controls {
    display:flex; align-items:center; gap:12px;
    padding:16px 32px; background:var(--surface2);
    border-bottom:1px solid var(--border);
    flex-wrap:wrap;
  }
  .period-selector { display:flex; gap:4px; background:var(--surface); border-radius:8px; padding:3px; }
  .period-btn {
    padding:6px 16px; font-family:'Poppins',sans-serif; font-size:11px; font-weight:500;
    border:none; border-radius:6px; cursor:pointer; color:var(--muted);
    background:transparent; transition:all 0.15s; letter-spacing:0.5px;
  }
  .period-btn.active { background:var(--accent); color:#fff; }
  .search-box {
    flex:1; min-width:180px; max-width:300px;
    background:var(--surface); border:1px solid var(--border); border-radius:8px;
    padding:7px 14px; color:var(--text); font-family:'Poppins',sans-serif; font-size:12px;
    outline:none; transition:border-color 0.15s;
  }
  .search-box:focus { border-color:var(--accent); }
  .search-box::placeholder { color:var(--muted); }
  select.filter-select {
    background:var(--surface); border:1px solid var(--border); border-radius:8px;
    padding:7px 12px; color:var(--text); font-family:'Poppins',sans-serif; font-size:11px;
    outline:none; cursor:pointer;
  }
  .view-toggle { display:flex; gap:4px; background:var(--surface); border-radius:8px; padding:3px; }
  .view-btn {
    padding:6px 12px; font-size:11px; border:none; border-radius:6px;
    cursor:pointer; background:transparent; color:var(--muted); transition:all 0.15s;
    font-family:'Poppins',sans-serif;
  }
  .view-btn.active { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
  .spacer { flex:1; }
  .refresh-btn {
    padding:7px 14px; font-size:11px; border:1px solid var(--border); border-radius:8px;
    background:transparent; color:var(--muted); cursor:pointer; font-family:'Poppins',sans-serif;
    transition:all 0.15s;
  }
  .refresh-btn:hover { border-color:var(--accent); color:var(--accent); }

  /* STATS BAR */
  .stats-bar {
    display:flex; gap:1px; padding:0 32px 0;
    background:var(--bg);
  }
  .stat-card {
    flex:1; padding:14px 20px; background:var(--surface);
    border-bottom:1px solid var(--border);
  }
  .stat-card:first-child { border-radius:0; }
  .stat-val { font-family:'Poppins',sans-serif; font-size:26px; font-weight:800; line-height:1; }
  .stat-label { font-size:10px; color:var(--muted); margin-top:4px; letter-spacing:1px; text-transform:uppercase; }
  .stat-card.s-done .stat-val { color:var(--done); }
  .stat-card.s-wip .stat-val { color:var(--wip); }
  .stat-card.s-ns .stat-val { color:var(--muted); }
  .stat-card.s-over .stat-val { color:var(--overdue); }

  /* MAIN CONTENT */
  .main { padding:24px 32px; }

  /* TABLE VIEW */
  .task-table { width:100%; border-collapse:collapse; }
  .task-table th {
    text-align:left; padding:10px 14px; font-size:10px; letter-spacing:1.5px;
    text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--border);
    font-weight:500;
  }
  .task-table td { padding:12px 14px; border-bottom:1px solid var(--border); font-size:12px; vertical-align:middle; }
  .task-table tr:hover td { background:var(--surface); }
  .week-header td {
    padding:8px 14px; font-family:'Poppins',sans-serif; font-size:11px; font-weight:700;
    color:var(--accent); letter-spacing:2px; text-transform:uppercase;
    background:var(--surface2); border-bottom:none;
  }

  /* STATUS BADGE */
  .badge {
    display:inline-flex; align-items:center; gap:5px;
    padding:3px 10px; border-radius:20px; font-size:10px; font-weight:500;
    letter-spacing:0.5px; text-transform:uppercase; cursor:pointer; transition:all 0.15s;
    border:none; font-family:'Poppins',sans-serif;
  }
  .badge:hover { opacity:0.8; transform:scale(0.97); }
  .badge-dot { width:5px; height:5px; border-radius:50%; }
  .badge.Done { background:rgba(109,250,188,0.12); color:var(--done); }
  .badge.Done .badge-dot { background:var(--done); }
  .badge.WIP { background:rgba(250,204,109,0.12); color:var(--wip); }
  .badge.WIP .badge-dot { background:var(--wip); }
  .badge.Not-Started { background:rgba(107,107,133,0.12); color:var(--muted); }
  .badge.Not-Started .badge-dot { background:var(--muted); }
  .badge.Overdue { background:rgba(250,109,138,0.12); color:var(--overdue); }
  .badge.Overdue .badge-dot { background:var(--overdue); }

  /* AREA TAG */
  .area-tag {
    display:inline-block; padding:2px 8px; border-radius:4px;
    font-size:10px; background:var(--surface2); color:var(--muted);
    border:1px solid var(--border); margin:1px;
  }

  /* WHATSAPP BTN */
  .wa-btn {
    padding:5px 12px; border-radius:6px; font-size:10px; font-weight:500;
    border:1px solid #25d366; color:#25d366; background:rgba(37,211,102,0.05);
    cursor:pointer; font-family:'Poppins',sans-serif; transition:all 0.15s;
    white-space:nowrap;
  }
  .wa-btn:hover { background:rgba(37,211,102,0.15); }

  /* GRID VIEW (Ecommerce) */
  .grid-container { overflow-x:auto; }
  .grid-table { min-width:900px; width:100%; border-collapse:collapse; }
  .grid-table th {
    padding:10px 12px; font-size:10px; letter-spacing:1px; text-transform:uppercase;
    color:var(--muted); border:1px solid var(--border); text-align:center;
    background:var(--surface); font-weight:500;
  }
  .grid-table th.portal-col { text-align:left; min-width:120px; }
  .grid-table td {
    padding:10px 12px; border:1px solid var(--border); font-size:11px;
    vertical-align:top; line-height:1.5; color:var(--text);
  }
  .grid-table td.portal-name {
    font-family:'Poppins',sans-serif; font-weight:600; font-size:12px;
    color:var(--accent); background:var(--surface); white-space:nowrap;
  }
  .grid-table td:not(.portal-name) { background:var(--surface); }
  .grid-table td:not(.portal-name):hover { background:var(--surface2); }
  .grid-week-header { background:var(--surface2); }
  .grid-week-header td {
    font-family:'Poppins',sans-serif; font-size:11px; font-weight:700;
    color:var(--accent3); letter-spacing:2px; text-align:left;
    padding:10px 14px; border:1px solid var(--border);
  }

  /* LOADING */
  .loading-state { text-align:center; padding:60px; color:var(--muted); font-size:12px; }
  .loading-spinner {
    width:32px; height:32px; border:2px solid var(--border);
    border-top-color:var(--accent); border-radius:50%;
    animation:spin 0.8s linear infinite; margin:0 auto 16px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* EMPTY STATE */
  .empty-state { text-align:center; padding:60px; color:var(--muted); }
  .empty-icon { font-size:48px; margin-bottom:12px; opacity:0.3; }

  /* TOAST */
  .toast {
    position:fixed; bottom:24px; right:24px; padding:12px 20px;
    background:var(--surface2); border:1px solid var(--border); border-radius:10px;
    font-size:12px; color:var(--text); z-index:1000;
    transform:translateY(80px); opacity:0; transition:all 0.3s;
    max-width:320px;
  }
  .toast.show { transform:translateY(0); opacity:1; }
  .toast.success { border-color:var(--done); }
  .toast.error { border-color:var(--overdue); }

  /* MODAL */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:500;
    display:none; align-items:center; justify-content:center;
    backdrop-filter:blur(4px);
  }
  .modal-overlay.show { display:flex; }
  .modal {
    background:var(--surface); border:1px solid var(--border); border-radius:16px;
    padding:28px; max-width:460px; width:90%; animation:slideUp 0.2s ease;
  }
  @keyframes slideUp { from{transform:translateY(20px);opacity:0;} to{transform:translateY(0);opacity:1;} }
  .modal-title { font-family:'Poppins',sans-serif; font-size:18px; font-weight:700; margin-bottom:8px; }
  .modal-task { font-size:12px; color:var(--muted); margin-bottom:20px; line-height:1.6; }
  .modal-section { margin-bottom:16px; }
  .modal-label { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
  .modal-input {
    width:100%; padding:10px 14px; background:var(--surface2);
    border:1px solid var(--border); border-radius:8px;
    color:var(--text); font-family:'Poppins',sans-serif; font-size:12px; outline:none;
  }
  .modal-input:focus { border-color:var(--accent); }
  .modal-textarea { width:100%; height:80px; resize:none; }
  .modal-actions { display:flex; gap:10px; margin-top:20px; }
  .btn-primary {
    flex:1; padding:10px; background:var(--accent); color:#fff; border:none;
    border-radius:8px; font-family:'Poppins',sans-serif; font-size:13px; font-weight:600;
    cursor:pointer; transition:all 0.15s;
  }
  .btn-primary:hover { opacity:0.85; }
  .btn-secondary {
    padding:10px 18px; background:transparent; color:var(--muted);
    border:1px solid var(--border); border-radius:8px;
    font-family:'Poppins',sans-serif; font-size:12px; cursor:pointer;
  }
  .btn-wa {
    flex:1; padding:10px; background:rgba(37,211,102,0.1); color:#25d366;
    border:1px solid #25d366; border-radius:8px;
    font-family:'Poppins',sans-serif; font-size:13px; font-weight:600; cursor:pointer;
    transition:all 0.15s;
  }
  .btn-wa:hover { background:rgba(37,211,102,0.2); }

  /* NOTES CELL */
  .notes-text { color:var(--muted); font-size:11px; font-style:italic; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  /* THEME SWITCHER */
  .theme-switcher { display:flex; gap:6px; align-items:center; }
  .theme-btn {
    width:18px; height:18px; border-radius:50%; border:2px solid transparent;
    cursor:pointer; transition:all 0.15s;
  }
  .theme-btn.active { border-color:var(--accent); transform:scale(1.2); }
  .theme-btn:hover { transform:scale(1.15); }

  /* THEMES */
  body.theme-dark {
    --bg:#0a0a0f; --surface:#13131a; --surface2:#1c1c27; --border:#2a2a3a;
    --accent:#7c6dfa; --accent2:#fa6d8a; --accent3:#6dfabc;
    --text:#e8e8f0; --muted:#9090aa;
    --text-strong:#ffffff; --text-table:#d8d8ee; --text-badge:#ffffff;
    --stat-label:#9090aa;
  }
  body.theme-purple {
    --bg:#0d0118; --surface:#160228; --surface2:#1f0338; --border:#3a1060;
    --accent:#b44dff; --accent2:#ff4daa; --accent3:#4dffcc;
    --text:#f0e8ff; --muted:#b090cc;
    --text-strong:#ffffff; --text-table:#e8d8ff; --text-badge:#ffffff;
    --stat-label:#b090cc;
  }
  body.theme-midnight {
    --bg:#020b18; --surface:#071525; --surface2:#0d2035; --border:#1a3a55;
    --accent:#38b6ff; --accent2:#ff6b9d; --accent3:#38ffcc;
    --text:#e0f0ff; --muted:#80aace;
    --text-strong:#ffffff; --text-table:#cce4ff; --text-badge:#ffffff;
    --stat-label:#80aace;
  }
  body.theme-forest {
    --bg:#061a0e; --surface:#0c2818; --surface2:#143520; --border:#1e4d2a;
    --accent:#4dff91; --accent2:#ffcc4d; --accent3:#4dfff0;
    --text:#d8ffe0; --muted:#7ab888;
    --text-strong:#ffffff; --text-table:#c8f5d0; --text-badge:#061a0e;
    --stat-label:#7ab888;
  }
  body.theme-light {
    --bg:#f0f2f8; --surface:#ffffff; --surface2:#e4e8f4; --border:#c4cce0;
    --accent:#4535d4; --accent2:#d4355a; --accent3:#0f9e68;
    --text:#0a0a1a; --muted:#44486a;
    --text-strong:#000000; --text-table:#0a0a1a; --text-badge:#ffffff;
    --stat-label:#44486a;
    --done:#0a7a4a; --wip:#8a6000; --notstarted:#44486a; --overdue:#b02040;
  }

  /* Universal text contrast rules */
  .stat-label { color: var(--stat-label, var(--muted)) !important; }
  .stat-val { color: var(--text-strong, var(--text)) !important; }
  .stat-card.s-done .stat-val { color: var(--done) !important; }
  .stat-card.s-wip .stat-val { color: var(--wip) !important; }
  .stat-card.s-ns .stat-val { color: var(--notstarted, var(--muted)) !important; }
  .stat-card.s-over .stat-val { color: var(--overdue) !important; }
  .task-table td { color: var(--text-table, var(--text)) !important; }
  .task-table th { color: var(--muted) !important; }
  .logo { color: var(--text-strong, var(--text)) !important; }
  .dept-tab { color: var(--muted) !important; }
  .dept-tab.active { color: var(--accent) !important; }
  .dept-tab:hover { color: var(--text) !important; }
  .header-meta { color: var(--muted) !important; }
  .notes-text { color: var(--muted) !important; }
  .area-tag { color: var(--muted) !important; }
  .modal-title { color: var(--text-strong, var(--text)) !important; }
  .modal-task { color: var(--text, var(--text)) !important; }
  .modal-label { color: var(--muted) !important; }
  .modal-input { color: var(--text-table, var(--text)) !important; }
  select.filter-select { color: var(--text-table, var(--text)) !important; }
  .search-box { color: var(--text-table, var(--text)) !important; }
  .period-btn { color: var(--muted) !important; }
  .period-btn.active { color: #fff !important; }
  .refresh-btn { color: var(--muted) !important; }
  .week-header td { color: var(--accent) !important; }

  /* Light mode specific overrides */
  body.theme-light .header { background: linear-gradient(180deg,#e4e8f4 0%,#f0f2f8 100%); }
  body.theme-light .badge.Not-Started { background:rgba(68,72,106,0.1); color:#44486a; }
  body.theme-light .badge.WIP { background:rgba(138,96,0,0.12); color:#8a6000; }
  body.theme-light .badge.Done { background:rgba(10,122,74,0.12); color:#0a7a4a; }
  body.theme-light .badge.Overdue { background:rgba(176,32,64,0.12); color:#b02040; }
  body.theme-light .wa-btn { border-color:#1a8a44; color:#1a8a44; }
  body.theme-light .task-table tr:hover td { background:var(--surface2) !important; }
  body.theme-light .grid-table td { color: var(--text-table) !important; background: var(--surface) !important; }
  body.theme-light .grid-table td.portal-name { color: var(--accent) !important; }
  body.theme-light select option { background: #ffffff; color: #0a0a1a; }
/* --- CUSTOM HEADER SIZE --- */
    .task-table th { font-size: 13px !important; }
</style>
  
</head>
<body>

<div class="header">
  <div>
    <div class="logo">AS — <span>CEO DASHBOARD</span></div>
    <div style="font-size:10px;color:var(--muted);margin-top:3px;letter-spacing:1px;">OPERATIONS DASHBOARD</div>
  </div>
  <div style="display:flex;align-items:center;gap:16px;">
    <div class="theme-switcher" id="theme-switcher">
      <button class="theme-btn active" onclick="setTheme('dark')" title="Dark" style="background:#0a0a0f;"></button>
      <button class="theme-btn" onclick="setTheme('purple')" title="Purple" style="background:#1a0533;"></button>
      <button class="theme-btn" onclick="setTheme('midnight')" title="Midnight Blue" style="background:#020b18;"></button>
      <button class="theme-btn" onclick="setTheme('forest')" title="Forest" style="background:#061a0e;"></button>
      <button class="theme-btn" onclick="setTheme('light')" title="Light" style="background:#f0f0f5;border:1px solid #ccc;"></button>
    </div>
    <div class="header-meta">
      <div><span class="live-dot"></span>LIVE — auto-refresh 30s</div>
      <div id="last-updated">—</div>
    </div>
  </div>
</div>

<div class="dept-tabs" id="dept-tabs"></div>

<div class="controls">
  <div class="period-selector" id="period-selector">
    <button class="period-btn" onclick="setPeriod('Daily')" id="pbtn-Daily">Daily</button>
    <button class="period-btn active" onclick="setPeriod('Weekly')" id="pbtn-Weekly">Weekly</button>
    <button class="period-btn" onclick="setPeriod('Monthly')" id="pbtn-Monthly">Monthly</button>
    <button class="period-btn" onclick="setPeriod('Quarterly')" id="pbtn-Quarterly">Quarterly</button>
  </div>
  <input class="search-box" type="text" placeholder="Search tasks..." id="search-input" oninput="renderContent()">
  <select class="filter-select" id="status-filter" onchange="renderContent()">
    <option value="">All Statuses</option>
    <option value="Done">Done</option>
    <option value="WIP">WIP</option>
    <option value="Not Started">Not Started</option>
    <option value="Overdue">Overdue</option>
  </select>
  <select class="filter-select" id="team-filter" onchange="renderContent()" title="Filter by owner">
    <option value="">All Owners</option>
  </select>
  <button onclick="remindDepartment()" style="background-color: #1a4d2e; border: 1px solid #25D366; color: #25D366; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 5px;">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
  REMIND DEPT

<script>

// ============================================================
// THEME
// ============================================================
const THEMES = ['dark','purple','midnight','forest','light'];

// ============================================================

const REAL_DEPTS = ['Marketing','Ecommerce','Operations','Finance','R&D','GT MT','FO','B2B'];
const DEPTS = ['Summary', 'Marketing','Ecommerce','Operations','Finance','R&D','GT MT','FO','B2B'];

// ============================================================
// INIT
// ============================================================
function init() {

function renderDeptTabs() {

// Periods available per dept
const DEPT_PERIODS = {
  Marketing:  ['Weekly', 'Monthly'],
  Ecommerce:  ['Weekly', 'Monthly'],

  'R&D':      ['Weekly', 'Monthly'],

};

function setDept(dept) {
  activeDept = dept;
  activeView = 'task';
  
  const isSum = (dept === 'Summary');
  document.getElementById('period-selector').style.display = isSum ? 'none' : 'flex';

  document.getElementById('status-filter').style.display = isSum ? 'none' : 'block';

  document.getElementById('stats-bar').style.display = isSum ? 'none' : 'flex';

  if (isSum) {
    renderDeptTabs();
    renderContent();
    return;
  }

  // Reset period to first available for this dept
  const periods = DEPT_PERIODS[dept] || ['Weekly','Monthly','Quarterly'];
  if (!periods.includes(activePeriod)) activePeriod = periods[0];
  
  ['Daily','Weekly','Monthly','Quarterly'].forEach(p => {
    const btn = document.getElementById('pbtn-' + p);
    if (btn) btn.style.display = periods.includes(p) ? '' : 'none';

}
function setPeriod(p) {
  activePeriod = p;
  activeView = 'task';
  document.querySelectorAll('.period-btn').forEach(b => b.classList.toggle('active', b.textContent === p));
  renderContent();
}

function setView(v) {
  activeView = v;
  document.getElementById('vbtn-task').classList.toggle('active', v === 'task');
  document.getElementById('vbtn-grid').classList.toggle('active', v === 'grid');
  renderContent();
}

// ============================================================
// FETCH
// ============================================================
// ============================================================
// FETCH ENGINE
// ============================================================
function fetchData(reqDept, reqPeriod) {
  const fetchDept = reqDept || activeDept;
  const fetchPeriod = reqPeriod || activePeriod;

  if (fetchDept === 'Summary') {
    renderSummaryView();
    // Loop Breaker: Only fetch background data if this is the main automated refresh
    if (!reqDept && !window.isFetchingAll) {
      window.isFetchingAll = true;
      fetchAllDepts();
      setTimeout(() => { window.isFetchingAll = false; }, 3000);
    }
    return; 
  }

  if (APPS_SCRIPT_URL.includes('YOUR_')) return;
  
  const url = buildUrl(fetchDept, fetchPeriod);
  const callbackName = 'cb_' + fetchDept.replace(/[^a-z0-9]/gi, '_') + '_' + fetchPeriod + '_' + Date.now();
  
  const script = document.createElement('script');
  script.src = url + '&callback=' + callbackName;
  
  window[callbackName] = function(json) {
    // Cleanup the script tag
    delete window[callbackName];
    if (document.head.contains(script)) document.head.removeChild(script);
    
    if (json && json.data) {
      
      // --- GENTLE EMPTY STATE FILTER (KEEPS HISTORY) ---
      if (json.data.groups && json.data.groups.length > 0) {
        // Look through every week and just delete the fake placeholder tasks
        json.data.groups.forEach(group => {
          if (group.tasks) {
            group.tasks = group.tasks.filter(t => 
              t.task && !t.task.toLowerCase().includes('no tasks updated yet')
            );
          }
        });
      }
      // --------------------------------------------------
      // --------------------------------------------------
      if (!liveData[fetchDept]) liveData[fetchDept] = {};
      liveData[fetchDept][fetchPeriod] = json.data;
      
      // Update the UI live if we are looking at this specific tab
      if (activeDept === fetchDept && activePeriod === fetchPeriod) {
        renderContent();
      }
      // Live-update the Summary tab numbers in the background!
      if (activeDept === 'Summary') {
        renderSummaryView(); 
      }
      // Update the timestamp
      const lu = document.getElementById('last-updated');
      if (lu) lu.textContent = 'Updated ' + new Date().toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'}) + ' IST';
    }
  };
  
  script.onerror = function() {
    delete window[callbackName];
    if (document.head.contains(script)) document.head.removeChild(script);
  };
  
  document.head.appendChild(script);
}

function fetchAllDepts() {
  const lu = document.getElementById('last-updated');
  if (lu) lu.textContent = '⟳ Syncing...';
  
  REAL_DEPTS.forEach(d => {
    // Fetch Weekly and Monthly for every department
    const periods = (typeof DEPT_PERIODS !== 'undefined' && DEPT_PERIODS[d]) ? DEPT_PERIODS[d] : ['Weekly', 'Monthly'];
    periods.forEach(p => {
      fetchData(d, p);
    });
  });
}
// ============================================================
// RENDER CONTENT
// ============================================================
function renderContent() {
  if (activeDept === 'Summary') {
    renderSummaryView();
    return;
  }
  document.getElementById('stats-bar').style.display = 'flex'; 

  const data = liveData[activeDept]?.[activePeriod];
  const isEcom = activeDept === 'Ecommerce';
  const viewToggle = document.getElementById('view-toggle');
  viewToggle.style.display = (isEcom && data?.type === 'ecom') ? 'flex' : 'none';
  if (!data) {
    document.getElementById('main-content').innerHTML = '<div class="loading-state"><div class="loading-spinner"></div>Loading...</div>';
    return;
  }
// --- DYNAMIC STATS LOGIC ---
    let statsTasks = [];

    // For Weekly plans (like Ecommerce), ONLY count the newest week
    if (activePeriod === 'Weekly' && data && data.groups && data.groups.length > 0) {
      statsTasks = data.groups[0].tasks || [];
    } else if (data && data.groups) {
      data.groups.forEach(g => statsTasks.push(...(g.tasks || [])));
    }

    updateTeamFilter(statsTasks);
    updateStats(statsTasks);

    // --- TABLE RENDERING LOGIC ---
    if (data && data.type === 'ecom' && activeView === 'grid') {
      renderEcomGrid(data);
    } else if (data && data.type === 'ecom') {
      renderTaskTable(data.groups || [], data.tasks || []);
    } else if (data) {
      renderTaskTable(data.groups || []);
    }

  
}   // <-- This closes the main function door AT THE VERY END!

// ------------------------------------------------------------

function updateTeamFilter(tasks) {
  const teams = [...new Set(tasks.map(t => t.team).filter(Boolean))].sort();
  const sel = document.getElementById('team-filter');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All Teams</option>' + teams.map(t => `<option value="${t}" ${t===cur?'selected':''}>${t}</option>`).join('');
}

function updateStats(tasks) {
  const sf = document.getElementById('status-filter').value;
  const tf = document.getElementById('team-filter').value;
  const sq = document.getElementById('search-input').value.toLowerCase();

  const filtered = tasks.filter(t => {
    const s = normalizeStatus(t.status);
    if (sf && s !== sf) return false;
    if (tf && t.team !== tf) return false;
    if (sq && !t.task.toLowerCase().includes(sq) && !(t.area||'').toLowerCase().includes(sq)) return false;
    return true;
  });

  document.getElementById('stat-total').textContent = filtered.length;
  document.getElementById('stat-done').textContent = filtered.filter(t => normalizeStatus(t.status) === 'Done').length;
  document.getElementById('stat-wip').textContent = filtered.filter(t => normalizeStatus(t.status) === 'WIP').length;
  document.getElementById('stat-ns').textContent = filtered.filter(t => normalizeStatus(t.status) === 'Not Started').length;
  document.getElementById('stat-over').textContent = filtered.filter(t => normalizeStatus(t.status) === 'Overdue').length;
}

function normalizeStatus(s) {
  if (!s) return 'Not Started';
  const u = s.trim().toLowerCase();
  if (['done', 'complete', 'completed', 'closed', 'finished'].includes(u)) return 'Done';
  if (['wip', 'in progress', 'in-progress', 'ongoing', 'active', 'started'].includes(u)) return 'WIP';
  if (['overdue', 'delayed', 'missed', 'late'].includes(u)) return 'Overdue';
  if (['pending', 'not started', 'not-started', 'todo', 'to do', 'open', '-', ''].includes(u)) return 'Not Started';
  return s.trim();
}

function getFilters() {
  return {
    sf: document.getElementById('status-filter').value,
    tf: document.getElementById('team-filter').value,
    sq: document.getElementById('search-input').value.toLowerCase(),
  };
}

function filterTasks(tasks) {
  const {sf, tf, sq} = getFilters();
  return tasks.filter(t => {
    const s = normalizeStatus(t.status);
    if (sf && s !== sf) return false;
    if (tf && t.team !== tf) return false;
    if (sq && !t.task.toLowerCase().includes(sq) && !(t.area||'').toLowerCase().includes(sq)) return false;
    return true;
  });
}
// ============================================================
// TASK TABLE (WITH PER-CATEGORY DYNAMIC HEADERS)
// ============================================================
function renderTaskTable(groups, extraTasks) {
  const isRDMonthly = (activeDept === 'R&D' && activePeriod === 'Monthly');

  // 1. Set Global Headers (For all standard tabs)
  let globalArea = "Area / Category";
  let globalTeam = "Team / POC";
  let globalTask = "Task";
  let globalNotes = "Notes";

  if (activeDept === 'B2B') {
    globalArea = "Client Name"; globalTeam = "POC"; globalTask = "Actionable"; globalNotes = "Industry & Notes";
  } else if (activeDept === 'Operations') {
    globalArea = "Client / PO"; globalTeam = "POC"; globalTask = "Actionable"; globalNotes = "Notes";
  } else if (activeDept === 'Finance') {
    globalArea = "Category"; globalTeam = "Concerned"; globalTask = "Task"; globalNotes = "Remarks";
  } else if (activeDept === 'GT MT') {
    globalArea = "Category"; 
    globalTeam = "Concerned"; 
    globalTask = "Details"; 
    globalNotes = "Notes";
  } else if (activeDept === 'R&D' && activePeriod === 'Weekly') {
    globalArea = "Week"; globalTeam = "POC"; globalTask = "Task"; globalNotes = "Remarks";
  }

  let html = `<table class="task-table">`;
  

  // 2. Only print the global header at the top if it is NOT R&D Monthly
  if (!isRDMonthly) {
    if (activeDept === 'Finance') {
      // CUSTOM ORDER FOR FINANCE
      html += `<thead><tr>
        <th>Task</th>
        <th style="width:150px">Concerned</th>
        <th style="width:150px">Department</th>
        <th style="width:250px">Remarks</th>
        <th style="width:110px">Due Date</th>
        <th style="width:130px">Status</th>
        <th style="width:100px">Action</th>
      </tr></thead>`;
    } else if (activeDept === 'B2B') {
      // NEW CUSTOM ORDER FOR B2B
      html += `<thead><tr>
        <th style="width:160px">Client Name</th>
        <th>Actionable</th>
        <th style="width:110px">Cost Sheet</th>
        <th style="width:110px">Sample Sheet</th>
        <th style="width:110px">Meeting Set</th>
        <th style="width:110px">Status</th>
        <th style="width:200px">Notes</th>
        <th style="width:100px">Action</th>
      </tr></thead>`;
    } else if (activeDept === 'FO') {
      // NEW CUSTOM ORDER FOR FO
      html += `<thead><tr>
        <th style="width:250px">Task</th>
        <th style="width:150px">POC</th>
        <th style="width:130px">Status</th>
        <th style="width:120px">Timeline</th>
        <th style="width:220px">Notes</th>
        <th style="width:110px">Action</th>
      </tr></thead>`;
    } else {
      // STANDARD ORDER FOR ALL OTHER TABS
      html += `<thead><tr>
        <th style="width:180px">${globalArea}</th>
        <th style="width:160px">${globalTeam}</th>
        <th>${globalTask}</th>
        <th style="width:130px">Status</th>
        <th style="width:120px">Due Date</th>
        <th style="width:220px">${globalNotes}</th>
        <th style="width:110px">Action</th>
      </tr></thead>`;
    }
  }

  let hasRows = false;
  const safeGroups = groups || [];

  safeGroups.forEach((g, groupIndex) => {
    const filtered = filterTasks(g.tasks || []);
    if (filtered.length === 0) return;
    hasRows = true;

    const isOpen = groupIndex === 0;
    const displayStyle = isOpen ? '' : 'display:none;';
    const icon = isOpen ? '−' : '+';

    // Stale detection: if _isStale flag set by Apps Script, warn the founder
    let weekLabel = g.week;
    let weekHeaderStyle = '';
    if (g.week === 'Live Data' && g._isStale) {
      weekLabel = '⚠️ Previous week\'s data — sheet not yet updated this week';
      weekHeaderStyle = 'color: var(--overdue) !important;';
    }

    html += `<tbody>
      <tr class="week-header" onclick="toggleGroup('g_${groupIndex}')" style="cursor:pointer;" title="Click to expand/collapse">
        <td colspan="7" style="${weekHeaderStyle}">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <span>📅 ${weekLabel}</span>
            <span id="icon-g_${groupIndex}" style="font-size:16px; font-weight:bold;">${icon}</span>
          </div>
        </td>
      </tr>
    </tbody>
    <tbody id="tasks-g_${groupIndex}" style="${displayStyle}">`;
    // 3. INJECT SPECIFIC HEADERS INSIDE EACH FOLDER FOR R&D MONTHLY!
    if (isRDMonthly) {
       let catArea = "PRODUCT"; 
       let catTeam = "POC"; 
       let catTask = "FLAVOURS"; 
       let catNotes = "REMARKS";
       
       let upperWeek = (g.week || '').toUpperCase();

       if (upperWeek.includes('TRIALS')) {
           catArea = "TRIALS"; catTask = "TIMELINE"; catNotes = "REMARKS";
       } else if (upperWeek.includes('VISITS')) {
           catArea = "VISITS"; catTask = "TIMELINE"; catNotes = "PURPOSE / REMARKS";
       } else if (upperWeek.includes('EPI')) {
           catArea = "EPI"; catTask = "PROBLEM"; catNotes = "SOLUTION";
       }

       // Print a mini-header row inside the folder!
       html += `<tr>
          <th style="width:180px">${catArea}</th>
          <th style="width:160px">${catTeam}</th>
          <th>${catTask}</th>
          <th style="width:130px">STATUS</th>
          <th style="width:220px">${catNotes}</th>
          <th style="width:110px">ACTION</th>
       </tr>`;
    }

    filtered.forEach((t, i) => {
      html += taskRow(t, 'g_' + groupIndex + '_' + i);
    });
    html += `</tbody>`;
  });

  if (extraTasks && extraTasks.length > 0) {
    const filtered = filterTasks(extraTasks);
    if (filtered.length > 0) {
      hasRows = true;
      const isOpen = safeGroups.length === 0; 
      const displayStyle = isOpen ? '' : 'display:none;';
      const icon = isOpen ? '−' : '+';

      html += `<tbody>
        <tr class="week-header" onclick="toggleGroup('extra')" style="cursor:pointer;" title="Click to expand/collapse">
          <td colspan="7">
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <span>📋 Extracted Tasks</span>
              <span id="icon-extra" style="font-size:16px; font-weight:bold;">${icon}</span>
            </div>
          </td>
        </tr>
      </tbody>
      <tbody id="tasks-extra" style="${displayStyle}">`;

      if (isRDMonthly) {
         html += `<tr>
            <th style="width:180px">ITEM</th>
            <th style="width:160px">POC</th>
            <th>DETAILS</th>
            <th style="width:130px">STATUS</th>
            <th style="width:220px">REMARKS</th>
            <th style="width:110px">ACTION</th>
         </tr>`;
      }

      filtered.forEach((t, i) => {
        html += taskRow(t, 'extra_' + i);
      });
      html += `</tbody>`;
    }
  }

  html += '</table>';

  if (!hasRows) {
    const hasFilters = document.getElementById('search-input').value || document.getElementById('status-filter').value || document.getElementById('team-filter').value;
    html = hasFilters
      ? '<div class="empty-state"><div class="empty-icon">🔍</div>No tasks match your filters</div>'
      : '<div class="empty-state"><div class="empty-icon">📝</div>The plan has not been updated yet</div>';
  }

  document.getElementById('main-content').innerHTML = html;
}

// ============================================================
// TASK ROW ENGINE
// ============================================================
function taskRow(t, id) {
  let s = t.status || '';
  const areas = (t.area || '').split(',').map(a => `<span class="area-tag">${a.trim()}</span>`).join('');
  
  // Cleans the "Due: X" text out of the notes
  let displayNotes = t.notes || '';
  if (displayNotes.toLowerCase().includes('due:')) {
     displayNotes = displayNotes.replace(/Due:.*?(;|\n|<br>)/i, '').trim();
  }

  // --- B2B STATUS EXTRACTOR ---
  if (activeDept === 'B2B') {
      const lowerNotes = displayNotes.toLowerCase();
      if (lowerNotes.includes('industry: wip')) {
          s = 'WIP';
          displayNotes = displayNotes.replace(/Industry:\s*WIP\s*-?\s*/i, '').trim();
      } else if (lowerNotes.includes('industry: complete') || lowerNotes.includes('industry: compl')) {
          s = 'Done';
          displayNotes = displayNotes.replace(/Industry:\s*Complete\s*-?\s*/i, '').trim();
      } else if (lowerNotes.includes('industry: pending') || lowerNotes.includes('industry: not started')) {
          s = 'Not Started';

  // --- NEW: REORDERED COLUMNS FOR FO ---

  if (activeDept === 'FO') {
    return `<tr style="${rowStyle}">
      <td style="font-size:13px;font-weight:500">${t.task || '—'}</td>

  return `<tr style="${rowStyle}">

function renderEcomGrid(data) {

function openWaModal(task) {
  pendingWaTask = task;
  const contacts = DEPT_CONTACTS[activeDept] || {};
  document.getElementById('wa-owner').value = contacts.owner || '';
  document.getElementById('wa-manager').value = contacts.manager || '';
  document.getElementById('wa-task-info').innerHTML = `<b>${task.task}</b><br>Owner: ${task.owner || '—'} · Due: ${task.due || '—'}<br>Status: ${task.status || '—'}`;
  const msg = `Hi! 👋 This is a reminder about the following task:\n\n📌 *${task.task}*\nOwner: ${task.owner || '—'}\nDue Date: ${task.due || '—'}\nDepartment: ${activeDept}\nStatus: ${task.status || 'Not Started'}\n\nPlease action this task at the earliest. Thank you! 🙏`;
  document.getElementById('wa-message').value = msg;
  document.getElementById('wa-modal').classList.add('show');
}

function closeModal() {
  document.getElementById('wa-modal').classList.remove('show');
  pendingWaTask = null;
}

function sendWhatsApp() {
  const owner = document.getElementById('wa-owner').value.trim().replace(/\s/g,'');
  const manager = document.getElementById('wa-manager').value.trim().replace(/\s/g,'');
  const msg = encodeURIComponent(document.getElementById('wa-message').value);

  if (!owner && !manager) { showToast('Please enter at least one phone number', 'error'); return; }

  if (owner) {
    const num = owner.startsWith('+') ? owner.slice(1) : owner;
    window.open(`https://wa.me/${num}?text=${msg}`, '_blank');
  }

  if (manager) {
    setTimeout(() => {
      const num = manager.startsWith('+') ? manager.slice(1) : manager;
      window.open(`https://wa.me/${num}?text=${msg}`, '_blank');
    }, 600);
  }

  closeModal();
  showToast('✅ WhatsApp opened for ' + [owner && 'Owner', manager && 'Manager'].filter(Boolean).join(' & '), 'success');
}

// STATUS UPDATE MODAL
// ============================================================
function openStatusModal(task) {
  pendingStatusUpdate = task;
  document.getElementById('status-task-info').innerHTML = `<b>${task.task}</b><br>Area: ${task.area || '—'} · Team: ${task.team || '—'}`;
  document.getElementById('status-select').value = normalizeStatus(task.status);
  document.getElementById('status-modal').classList.add('show');
}

function closeStatusModal() {
  document.getElementById('status-modal').classList.remove('show');
  pendingStatusUpdate = null;
}

function confirmStatusUpdate() {
  if (!pendingStatusUpdate) return;
  const newStatus = document.getElementById('status-select').value;

  const data = liveData[activeDept]?.[activePeriod];
  if (data) {
    const allGroups = data.type === 'ecom' ? [...(data.groups||[])].concat([{tasks: data.tasks||[]}]) : (data.groups||[]);
    allGroups.forEach(g => {
      (g.tasks||[]).forEach(t => {
        if (t.task === pendingStatusUpdate.task && t.area === pendingStatusUpdate.area) {
          t.status = newStatus;
        }
      });
    });
  }

  closeStatusModal();
  renderContent();
  showToast(`Status updated to "${newStatus}"`, 'success');
  pushStatusUpdate(pendingStatusUpdate, newStatus);
}

async function pushStatusUpdate(task, newStatus) {
  if (APPS_SCRIPT_URL.includes('YOUR_')) return;
  const url = APPS_SCRIPT_URL;

  try {
    await fetch(url, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'updateStatus', dept: activeDept, period: activePeriod, task: task.task, area: task.area, team: task.team, status: newStatus }),
    });
  } catch(e) {
    showToast('Could not sync to Google Sheets', 'error');
  }
}

  const t = document.getElementById('toast');

function getDeptStats(dept, period) {
  let stats = { total: 0, done: 0, wip: 0, ns: 0, over: 0 };
  const data = liveData[dept]?.[period];
  
  if (!data || !data.groups || data.groups.length === 0) return stats;

  // ONLY calculate the math for the CURRENT week/month (groups[0])
  const allTasks = [];
  data.groups.forEach(function(g) { (g.tasks || []).forEach(function(t) { allTasks.push(t); }); });
  
  allTasks.forEach(t => {
      stats.total++;
      const s = normalizeStatus(t.status);
      if (s === 'Done') stats.done++;
      else if (s === 'WIP') stats.wip++;
      else if (s === 'Overdue') stats.over++;
      else stats.ns++;
  });
  return stats;
}

function sendDeptReminder(dept) {
  // 1. The exact requested default message
  const text = `Reminder that the *${dept}* department has not updated the weekly or monthly tasks.`;

  const modal = document.getElementById('wa-modal');

  // 2. Open your existing modal
  if (typeof openWAModal === 'function') {
    openWAModal(`${dept.toUpperCase()} SUMMARY`, 'Multiple Owners', '-', 'Pending Updates');
  } else if (modal) {
    modal.style.display = 'flex';
  }

  // 3. Silently overwrite the Modal's contents for Summary View ONLY
  setTimeout(() => {
    if (modal) {
      // Overwrite the Message Box
      const textarea = modal.querySelector('textarea');
      if (textarea) textarea.value = text;

      // Overwrite the specific Phone Numbers
      const inputs = modal.querySelectorAll('input');
      if (inputs && inputs.length >= 2) {
         inputs[0].value = '+919930871199'; // Owner Number
         inputs[1].value = '+919930871199'; // Manager Number
      }

      // Overwrite the Title at the top
      const titleEl = document.getElementById('wa-task-name') || document.getElementById('wa-task-title');
      if (titleEl) titleEl.innerHTML = `<strong>${dept.toUpperCase()} SUMMARY</strong>`;
      
      const ownerEl = document.getElementById('wa-task-meta');
      if (ownerEl) ownerEl.innerHTML = `Owner: Multiple Owners &middot; Status: Pending`;

     // --- BULLETPROOF CANCEL BUTTON FIX ---
      const allElements = modal.querySelectorAll('*');
      allElements.forEach(el => {
        // Look for anything (button, link, span) that says exactly "Cancel"
        if (el.textContent && el.textContent.trim().toLowerCase() === 'cancel') {
          el.style.cursor = 'pointer';
          
          el.onclick = function(e) {
            e.preventDefault();
            e.stopPropagation(); // Block any other conflicting code from running
            
            // 1. Force the modal to hide instantly
            modal.style.display = 'none';
            
            // 2. Safely try the official close function in the background just in case
            if (typeof closeModal === 'function') {
               try { closeModal(); } catch(err) {} 
            }
          };
        }
      });
  }
  }, 50);
}

function remindDepartment() {
  // 1. Force the code to ONLY look inside the 'dept-tabs' container for the active item
  let activeTabElement = document.querySelector('#dept-tabs .active') || 
                         document.querySelector('#dept-tabs .selected') || 
                         document.querySelector('.tab.active');
                         
  let rawTabText = activeTabElement ? activeTabElement.innerText.toUpperCase() : "";

  // 2. The Master List
  const deptData = {
    "MARKETING": "+919840089201",
    "ECOMMERCE": "+917715807071",
    "OPERATIONS": "+919137801384",
    "FINANCE": "+918349332382",
    "R&D": "+917306141615",
    "GT MT": "+919004579848",
    "B2B": "+917715807071",
    "FO": "+919752356964",
  };

  let currentDept = "";
  let targetNumber = "";

  // 3. SMART MATCHER: Check if the tab contains our department names
  for (let key in deptData) {
    if (rawTabText.includes(key)) {
      currentDept = key;
      targetNumber = deptData[key];
      break; // Found it! Stop looking.
    }
  }

  // SAFETY CHECK: If it still fails, the alert will now tell us exactly what word it read!
  if (!targetNumber) {
    alert(`Oops! It could not find the number. The dashboard is currently reading the word: "${rawTabText}".`);
    return; 
  }

  // 4. Draft the official CEO message
  let message = `Hi ${currentDept} manager! 🚀 \n\nThis is a quick reminder from the CEO's desk to please update your team's task statuses on the Operations Dashboard for this week. If you have finished a task, please ensure it is marked as 'Complete' or 'Done'. \n\nThank you!`;

  // 5. Open Modal & Inject Data
  const modal = document.getElementById('wa-modal');
  
  if (modal) {
    modal.style.display = 'flex';
    
    // Inject message
    const messageBox = modal.querySelector('textarea');
    if (messageBox) {
        messageBox.value = message;
    }

    // Inject numbers into the actual values, replacing the placeholders!
    const inputBoxes = modal.querySelectorAll('input');
    if (inputBoxes.length >= 2) {
      inputBoxes[0].value = ""; // Keeps owner box blank
      inputBoxes[1].value = targetNumber; // Injects the real Manager number!
      
      // Force the browser to register that data was entered
      inputBoxes[1].dispatchEvent(new Event('input', { bubbles: true }));
    }

    // Wire up the Cancel button
    const buttons = modal.querySelectorAll('button');
    buttons.forEach(btn => {
        if (btn.innerText.trim().toLowerCase() === 'cancel') {
            btn.onclick = function(e) {
                e.preventDefault(); 
                modal.style.display = 'none';
            };
        }
    });

  } else {
    alert("Could not find the WhatsApp popup interface.");
  }
}
